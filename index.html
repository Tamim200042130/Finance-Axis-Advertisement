<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceAxis | Master Your Money</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700; /* Gold */
            --bg: #121212;      /* Deep Dark */
            --surface: #1E1E1E;
            --text: #FFFFFF;
            --text-secondary: #B0B0B0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lato', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, #1e1e1e 0%, #121212 100%);
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: 600px;
        }

        .cta-button {
            background-color: var(--primary);
            color: #000;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        /* Footer / Links */
        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--primary);
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate {
            animation: fadeIn 1s ease-out forwards;
        }

        /* Search Console Verification Tag - PASTE YOUR TAG HERE */
        /* <meta name="google-site-verification" content="YOUR_CODE_HERE" /> */
    </style>
</head>
<body>

    <section class="hero">
        <img src="logo.png" alt="FinanceAxis Logo" class="logo">
        <div class="animate">
            <h1>FinanceAxis</h1>
            <p class="tagline">Smart tracking. Real-time insights. Total control over your financial destiny. Join thousands masters of their tuition and expenses.</p>
            
            <a href="https://play.google.com/store/apps/details?id=com.tstationbd.financeaxis" class="cta-button">
                <span>Download on Google Play</span>
            </a>
        </div>
    </section>

    <footer class="footer">
        <a href="PRIVACY_POLICY.txt">Privacy Policy</a>
        <a href="TERMS%26CONDITIONS.txt">Terms & Conditions</a>
        <a href="mailto:your-email@example.com">Support</a>
    </footer>

</body>
</html>
